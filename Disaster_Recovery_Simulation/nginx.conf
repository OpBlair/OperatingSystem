events { worker_connections 1024; }

http {
    upstream my_cluster {
        # Max_fails=1 and fail_timeout=2s means: if it fails once, 
        # consider it dead for 2 seconds and switch immediately.
        server primary_dc:80 max_fails=1 fail_timeout=2s;
        
        # The 'backup' flag means traffic ONLY goes here if primary is down.
        server secondary_dc:80 backup;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://my_cluster;
            proxy_set_header Host $host;
            proxy_connect_timeout 2s; # Don't wait forever to realize a server is dead
        }
    }
}