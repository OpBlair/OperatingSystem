services:
  # The Load Balancer (Front Door)
  load_balancer:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro,Z
    depends_on:
      - primary_dc
      - secondary_dc

  # Data Center 1 (Primary)
  primary_dc:
    image: nginx:alpine
    volumes:
      - ./primary.html:/usr/share/nginx/html/index.html:ro,Z

  # Data Center 2 (Secondary)
  secondary_dc:
    image: nginx:alpine
    volumes:
      - ./secondary.html:/usr/share/nginx/html/index.html:ro,Z